<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cofinity-X Pub Quiz — Beamer</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    .beamer { height: 100vh; display: grid;
      grid-template-rows: auto 1fr;
      padding: min(5vh, 48px) min(6vw, 80px) min(6vh, 56px); }

    /* top bar: wordmark left, round tag right */
    .b-top { display: flex; align-items: center; justify-content: space-between;
      gap: min(2.5vw, 28px); flex-wrap: wrap; }
    .b-brand { display: flex; align-items: baseline; gap: 14px; }
    .b-wordmark { font-weight: 700; font-size: clamp(18px, 2vw, 26px); letter-spacing: -0.02em; }
    .b-kicker { font-family: 'JetBrains Mono', monospace; font-size: clamp(10px,1.1vw,14px);
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; }
    .b-roundtag { display: flex; align-items: center; gap: 14px;
      font-weight: 500; font-size: clamp(13px,1.4vw,19px); color: var(--ink-soft); }
    .b-roundpill { background: var(--grad); color: #fff; font-weight: 600;
      padding: 6px 16px; border-radius: 999px; font-size: 0.9em; letter-spacing: 0.01em; }

    /* question stage — true centre */
    .b-qview { display: grid; grid-template-rows: 1fr auto 1fr; align-items: center;
      justify-items: center; gap: min(3vh, 28px); height: 100%; }
    .b-timer-wrap { align-self: end; display: flex; flex-direction: column;
      align-items: center; gap: 8px; }
    .b-timer-label { font-family: 'JetBrains Mono', monospace; font-size: clamp(10px,1vw,13px);
      letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); }
    .b-timer { font-family: 'JetBrains Mono', monospace; font-weight: 600;
      font-size: clamp(48px, 8.5vw, 116px); line-height: 1; font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em; transition: color .2s ease; }
    .b-timer.low { color: var(--o3); }

    .b-question { font-weight: 700; font-size: clamp(32px, 5vw, 80px); line-height: 1.06;
      max-width: 20ch; margin: 0; letter-spacing: -0.03em; text-align: center; align-self: center; }

    .b-answer { align-self: start; display: none; flex-direction: column; align-items: center;
      gap: 10px; padding: 18px 44px; border-radius: 20px; background: #fff;
      border: 1px solid var(--line); box-shadow: 0 20px 56px rgba(0,0,0,0.10);
      animation: answerIn .35s ease; }
    .b-answer.show { display: flex; }
    @keyframes answerIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .b-answer-label { font-family: 'JetBrains Mono', monospace; font-size: clamp(11px,1.1vw,14px);
      letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); }
    .b-answer-text { font-weight: 800; font-size: clamp(28px,4vw,56px); letter-spacing: -0.02em; }

    /* scoreboard */
    .b-scoreview { display: none; flex-direction: column; justify-content: center;
      max-width: 1120px; width: 100%; margin: 0 auto; height: 100%; }
    .b-scoreview.show { display: flex; }
    .b-scorehead { display: flex; align-items: baseline; gap: 18px; margin: 0 0 min(5vh,40px); }
    .b-scoretitle { font-weight: 800; font-size: clamp(38px,6vw,88px);
      margin: 0; letter-spacing: -0.04em; }
    .b-scoresub { font-family: 'JetBrains Mono', monospace; font-size: clamp(12px,1.3vw,17px);
      text-transform: uppercase; letter-spacing: 0.18em; }
    .b-scorelist { display: flex; flex-direction: column; gap: min(2.6vh, 24px); }
    .b-scorerow { display: flex; align-items: center; gap: min(2.5vw, 30px); }
    .b-rank { font-family: 'JetBrains Mono', monospace; font-size: clamp(18px,2.4vw,36px);
      font-weight: 500; color: var(--muted); min-width: 1.3em; text-align: center; flex-shrink: 0; }
    .b-rank.first { color: var(--o3); font-weight: 700; }
    .b-barcol { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .b-bartop { display: flex; justify-content: space-between; align-items: baseline; }
    .b-teamname { font-weight: 600; font-size: clamp(20px,2.8vw,40px); letter-spacing: -0.02em; }
    .b-scoreval { font-family: 'JetBrains Mono', monospace; font-weight: 600;
      font-size: clamp(20px,2.8vw,40px); color: var(--ink-soft); font-variant-numeric: tabular-nums; }
    .b-scoreval.lead { color: var(--o3); }
    .b-bartrack { height: 8px; background: #D6D6D6; border-radius: 4px; overflow: hidden; }
    .b-barfill { height: 100%; background: var(--grad); border-radius: 4px; transition: width .5s ease; }
    .b-empty { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 18px; }

    /* waiting overlay */
    .b-waiting { position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 14px; text-align: center; padding: 24px; }
    .b-waiting h2 { font-weight: 700; font-size: 24px; letter-spacing: -0.02em; }
    .b-waiting p { color: var(--muted); font-size: 14px; max-width: 42ch; line-height: 1.6; }
    body.connected .b-waiting { display: none; }
  </style>
</head>
<body>
  <div class="beamer" id="beamer">
    <header class="b-top">
      <span class="b-brand">
        <span class="b-wordmark">Cofinity-X</span>
        <span class="b-kicker">Pub Quiz Night</span>
      </span>
      <span class="b-roundtag" id="b-roundtag" style="visibility:hidden">
        <span class="b-roundpill" id="b-roundpill">Round 1</span>
        <span id="b-roundname">General Knowledge</span>
      </span>
    </header>

    <!-- question view -->
    <div class="b-qview" id="b-qview">
      <div class="b-timer-wrap">
        <span class="b-timer-label">Time</span>
        <div class="b-timer" id="b-timer">01:00</div>
      </div>
      <p class="b-question" id="b-question">Get ready…</p>
      <div class="b-answer" id="b-answer">
        <span class="b-answer-label">Answer</span>
        <span class="b-answer-text grad-text" id="b-answer-text"></span>
      </div>
    </div>

    <!-- scoreboard view -->
    <div class="b-scoreview" id="b-scoreview">
      <div class="b-scorehead">
        <h1 class="b-scoretitle">Scoreboard</h1>
        <span class="b-scoresub grad-text">Live standings</span>
      </div>
      <div class="b-scorelist" id="b-scorelist"></div>
    </div>
  </div>

  <div class="b-waiting">
    <h2>Beamer ready</h2>
    <p>Waiting for the control window on this computer. Keep the control tab open and start running the quiz — this screen updates live.</p>
  </div>

  <script type="module" src="assets/beamer.js"></script>
</body>
</html>
